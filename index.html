<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Custom Game Bundle 🎁</title>
    <link rel="stylesheet" href="style.css?v=3">
</head>
<body>
    <!-- Toast Notifications Container -->
    <div id="toast-container" class="toast-container"></div>

    <!-- 1. HOME MENU -->
    <div id="menu-screen" class="game-container">
        <h1>Happy Birthday! 🎁</h1>
        <p>A special custom gift just for you.</p>
        <div class="menu-buttons">
            <button onclick="switchScreen('wordle-screen')">Play Wordle</button>
            <button onclick="switchScreen('connections-screen')">Play Connections</button>
            <button onclick="switchScreen('crossword-screen')">Play Mini Crossword</button>
        </div>
    </div>

    <!-- 2. CONNECTIONS GAME -->
    <div id="connections-screen" class="game-container hidden">
        <button class="back-btn" onclick="switchScreen('menu-screen')">← Menu</button>
        <h1>Custom Connections</h1>
        <p>Find groups of four related items!</p>
        <div id="grid" class="grid"></div>
        <div class="controls">
            <span id="mistakes">Mistakes remaining: ••••</span>
            <div class="button-group"> <!-- Wrapped buttons to keep them together -->
                <button id="shuffle-btn">Shuffle</button>
                <button id="submit-btn" disabled>Submit</button>
            </div>
        </div>
    </div>

    <!-- 3. WORDLE GAME -->
    <div id="wordle-screen" class="game-container hidden">
        <button class="back-btn" onclick="switchScreen('menu-screen')">← Menu</button>
        <h1>Custom Wordle</h1>
        <p>Guess the secret 5-letter word!</p>
        <div id="wordle-board" class="wordle-board"></div>
        <div id="keyboard" class="keyboard"></div>
    </div>

     <!-- CUSTOM CROSSWORD GAME -->
    <div id="crossword-screen" class="game-container hidden">
        <button class="back-btn" onclick="switchScreen('menu-screen')">← Menu</button>
        <h1>Custom Crossword 🧩</h1>
        <p id="clue-display" class="clue-display">Tap a white square to see its clue!</p>
        <div id="crossword-grid-5x5" class="crossword-grid-5x5"></div>
        <div class="crossword-controls">
            <button id="check-crossword-btn">Check Puzzle</button>
        </div>
    </div>

    <script src="script.js?v=fresh"></script>
</body>
</html>
